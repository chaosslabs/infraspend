name: Deploy Dashboard to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - dashboard/**
      - .github/workflows/dashboard-cloudflare-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: dashboard-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: ./dashboard
        env:
          CI: "false"
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL }}
          REACT_APP_AUTH0_DOMAIN: ${{ vars.REACT_APP_AUTH0_DOMAIN }}
          REACT_APP_AUTH0_CLIENT_ID: ${{ vars.REACT_APP_AUTH0_CLIENT_ID }}
          REACT_APP_AUTH0_AUDIENCE: ${{ vars.REACT_APP_AUTH0_AUDIENCE }}
        run: |
          for name in REACT_APP_BACKEND_URL REACT_APP_AUTH0_DOMAIN REACT_APP_AUTH0_CLIENT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required. Add it as a GitHub Actions repository variable."
              exit 1
            fi
          done

          npm run build

      - name: Deploy dashboard to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dashboard/build
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'infraspend-dashboard' }}
            --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
