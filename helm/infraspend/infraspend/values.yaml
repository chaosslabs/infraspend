# Default values for infraspend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageRegistry: ghcr.io
  imageRepository: chaosslabs/finops-xray

api:
  name: infraspend-api
  image:
    repository: api
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: false
  config:
    logLevel: "info"
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: infraspend-postgresql
          key: postgres-url
    - name: DATADOG_API_KEY
      valueFrom:
        secretKeyRef:
          name: infraspend-secrets
          key: datadog-api-key
    - name: DATADOG_APP_KEY
      valueFrom:
        secretKeyRef:
          name: infraspend-secrets
          key: datadog-app-key

dashboard:
  name: infraspend-dashboard
  image:
    repository: dashboard
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    limits:
      cpu: 300m
      memory: 384Mi
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
  env:
    - name: REACT_APP_BACKEND_URL
      value: "http://infraspend-api:8000"
    - name: REACT_APP_AUTH0_DOMAIN
      valueFrom:
        secretKeyRef:
          name: infraspend-secrets
          key: auth0-domain
    - name: REACT_APP_AUTH0_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: infraspend-secrets
          key: auth0-client-id
    - name: REACT_APP_AUTH0_AUDIENCE
      valueFrom:
        secretKeyRef:
          name: infraspend-secrets
          key: auth0-audience

postgresql:
  enabled: true
  auth:
    username: infraspend
    database: infraspend
    existingSecret: infraspend-postgresql
  primary:
    persistence:
      size: 8Gi

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: infraspend.local
      paths:
        - path: /api
          pathType: Prefix
          service: infraspend-api
          port: 8000
        - path: /
          pathType: Prefix
          service: infraspend-dashboard
          port: 3000
  tls: []

secrets:
  create: true
  infraspendSecrets:
    auth0-domain: ""
    auth0-client-id: ""
    auth0-audience: ""
    datadog-api-key: ""
    datadog-app-key: ""
  postgresql:
    postgres-url: "postgresql://infraspend:password@infraspend-postgresql:5432/infraspend"

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
